<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Fundo responsivo */
.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('foto.jpg') no-repeat center center;
  background-size: cover;
}

/* Celular não cortar */
@media (max-width: 768px) {
  .background {
    background-size: contain;
    background-color: black;
  }
}

/* Escurecer */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

/* Carta */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  width: 280px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  z-index: 2;
}

.card h1 {
  color: #ff4d6d;
}

/* Botões */
button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* Botão música bonito */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 3;
  background: #ff4d6d;
  color: white;
  border-radius: 50px;
  padding: 12px 18px;
  font-size: 14px;
}

/* Corações */
.heart {
  position: fixed;
  top: -10px;
  color: red;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- Música -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<!-- Botão de música -->
<button class="music-btn" onclick="toggleMusic()" id="btnMusic">
  🎵 Tocar música
</button>

<!-- Carta -->
<div class="card">
  <h1>Nathalia ❤️</h1>
  <p>Eu sei que não sou perfeito...</p>
  <p>Sou grosso, meio chato às vezes,</p>
  <p>mas eu te amo, bb 💖</p>
  <p>Nunca esqueça disso.</p>

  <button onclick="alert('Eu te amo muito ❤️')">
    Clique aqui 😉
  </button>
</div>

<script>
let tocando = false;

function toggleMusic() {
  const music = document.getElementById("music");
  const btn = document.getElementById("btnMusic");

  if (!tocando) {
    music.play();
    btn.innerHTML = "⏸️ Pausar música";
    tocando = true;
  } else {
    music.pause();
    btn.innerHTML = "🎵 Tocar música";
    tocando = false;
  }
}

/* Corações */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
