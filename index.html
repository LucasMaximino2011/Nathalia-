<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* FUNDO COM BLUR (PROFISSIONAL) */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('foto.jpg') no-repeat center center;
  background-size: cover;
  filter: blur(20px);
  z-index: -2;
}

/* FOTO PRINCIPAL (SEM CORTE) */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('foto.jpg') no-repeat center center;
  background-size: contain;
  z-index: -1;
}

/* carta */
.carta {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  animation: cair 1s ease;
}

@keyframes cair {
  from {
    transform: translate(-50%, -200%);
  }
  to {
    transform: translate(-50%, -50%);
  }
}

h1 {
  color: #ff4d6d;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* corações */
.heart {
  position: fixed;
  top: -10px;
  color: red;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<div class="carta">
  <h1>Nathalia ❤️</h1>
  <p>Eu sei que não sou perfeito...</p>
  <p>Sou grosso, meio chato às vezes,</p>
  <p>mas eu te amo, bb 💖</p>
  <p>Nunca esqueça disso.</p>

  <button onclick="surpresa()">Clique aqui 😉</button>
</div>

<!-- MÚSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
function surpresa() {
  let audio = document.getElementById("musica");
  audio.play().catch(() => {});
  alert("Você é a melhor coisa da minha vida ❤️");
}

/* corações */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
